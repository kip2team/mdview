<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 浏览器窗口外框 -->
  <rect x="3" y="6" width="58" height="52" rx="7" fill="#1f2328"/>
  <!-- 三个交通灯圆点 -->
  <circle cx="10" cy="13" r="1.7" fill="#4493f8"/>
  <circle cx="16" cy="13" r="1.7" fill="#3fb950"/>
  <circle cx="22" cy="13" r="1.7" fill="#8b949e"/>
  <!-- 右上 </> 标记 -->
  <path d="M48 10.5 L45.5 13 L48 15.5 M54 10.5 L56.5 13 L54 15.5"
        stroke="#8b949e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M52.4 9.5 L49.6 16.5" stroke="#8b949e" stroke-width="1.1" stroke-linecap="round"/>
  <!-- 内部白色卡 -->
  <rect x="7" y="20" width="50" height="35" rx="3" fill="#ffffff"/>
  <!-- "m" 字母 -->
  <path d="M14 47 V35 a4 4 0 0 1 8 0 V47 M22 39 a4 4 0 0 1 8 0 V47"
        stroke="#1f2328" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- "d" 竖笔 -->
  <path d="M50 23 V47" stroke="#1f2328" stroke-width="4" stroke-linecap="round"/>
  <!-- "d" 的字碗 = 眼睛轮廓 -->
  <ellipse cx="43" cy="41" rx="7" ry="5" stroke="#1f2328" stroke-width="3" fill="#ffffff"/>
  <!-- 瞳孔 + 高光 -->
  <circle cx="43" cy="41" r="2.2" fill="#1f2328"/>
  <circle cx="44" cy="40" r="0.7" fill="#ffffff"/>
</svg>
