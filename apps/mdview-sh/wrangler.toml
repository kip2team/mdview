# Cloudflare Workers / Pages 配置 —— 通过 wrangler dev / deploy 使用
# 部署前需要：
#   1. wrangler kv namespace create SHORTLINKS
#   2. 把生成的 id 填到下面 [[kv_namespaces]] 的 id 字段
#   3. 同上为 RATE_KV 创建一个 namespace（也可以共用 SHORTLINKS，但分开更清晰）
name = "mdview-sh"
main = "./dist/_worker.js/index.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# 把 worker 绑到 mdview.sh 与 www.mdview.sh
# custom_domain = true 表示用 Custom Domain 模式（自动 SSL，apex 域名也能用）
# 而不是 route 模式（需要 DNS 上 orange-cloud + 手配 SSL）
routes = [
  { pattern = "mdview.sh", custom_domain = true },
  { pattern = "www.mdview.sh", custom_domain = true }
]

[assets]
directory = "./dist"

[[kv_namespaces]]
binding = "SHORTLINKS"
id = "c6611441850c4d89bafa98cfe16f13e6"

[[kv_namespaces]]
binding = "RATE_KV"
id = "d6fd580e044f48768f0e38eafc769496"

[observability]
enabled = true
