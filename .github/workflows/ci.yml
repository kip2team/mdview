name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同分支后续 push 自动取消上一次未完成的 run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Test
        run: pnpm -r run test

      - name: Build
        run: pnpm -r run build

  e2e:
    name: e2e (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter '@mdview/core' --filter '@mdview/themes' --filter '@mdview/format' run build

      - name: Install Playwright browsers
        run: pnpm --filter @mdview/desktop exec playwright install --with-deps chromium

      - name: Start vite dev in background
        run: pnpm --filter @mdview/desktop run dev &
        env:
          CI: '1'

      - name: Wait for dev server
        run: npx wait-on http://localhost:1420 --timeout 60000

      - name: Run E2E
        run: pnpm --filter @mdview/desktop run test:e2e
        env:
          MDVIEW_E2E_URL: http://localhost:1420

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/desktop/playwright-report
          retention-days: 7

  lint:
    name: lint · format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: false

      - name: Format check
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,md,css,html}"
