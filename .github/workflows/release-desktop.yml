name: release-desktop

# 触发: 推送 desktop-v* tag
# 流程: 构建 universal mac 二进制 -> 用 minisign 私钥签名 -> 上传到同名 GH Release ->
#       把 latest.json commit 到 main 的 apps/mdview-sh/public/release/latest.json,
#       桌面端 plugin-updater 通过 raw.githubusercontent.com 立即拿到新版本。

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # 每个 arch 一个 matrix job, 各自 build + 各自签。tauri-action 把 .dmg/.app.tar.gz 上传到 release;
    # .sig 在它 v0.5 里有 bug 不会自动上传, 我们自己用 gh CLI 兜底, 再把 signature 内容作为 artifact
    # 传给 publish-manifest job 拼装 latest.json。
    name: Build & sign macOS (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch_short: aarch64       # tauri-action 给 .app.tar.gz 用的后缀
            updater_key: darwin-aarch64  # plugin-updater 在 latest.json 里查找的 key
          - target: x86_64-apple-darwin
            arch_short: x64
            updater_key: darwin-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # 不设 version,让 action 直接读 package.json#packageManager,避免双源冲突
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Diagnose TAURI_SIGNING_PRIVATE_KEY shape (no secret leak)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          python3 <<'EOF'
          import os, hashlib, base64, string
          v = os.environ.get('TAURI_SIGNING_PRIVATE_KEY', '')
          print(f"length: {len(v)}")
          print(f"newline count: {v.count(chr(10))}")
          print(f"starts with 'untrusted': {v.startswith('untrusted')}")
          print(f"sha256 (first 16 hex chars): {hashlib.sha256(v.encode()).hexdigest()[:16]}")
          b64_alphabet = set(string.ascii_letters + string.digits + '+/=\n\r')
          print(f"is all-base64-charset: {all(c in b64_alphabet for c in v)}")
          try:
              decoded = base64.b64decode(v, validate=False)
              print(f"base64 decode ok, decoded length: {len(decoded)}")
              print(f"  decoded starts with 'untrusted': {decoded.startswith(b'untrusted')}")
              print(f"  decoded newline count: {decoded.count(chr(10).encode())}")
              # ascii-printable ratio (rough format hint)
              printable = sum(1 for b in decoded if 32 <= b < 127 or b in (10, 13, 9))
              print(f"  decoded printable ratio: {printable}/{len(decoded)}")
          except Exception as e:
              print(f"base64 decode error: {e}")
          EOF

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build workspace JS packages (consumed by desktop)
        run: pnpm -r --filter '@mdview/core' --filter '@mdview/themes' --filter '@mdview/format' run build

      - name: Build, sign & publish desktop release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ↓ 在 GitHub Secrets 里加这两个 (没 password 时第二个留空)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'mdview ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Re-sign tarball + upload .sig + emit manifest fragment
        # tauri-action 在重打包 .app.tar.gz 后没重新签 (它内部把 .sig 视作 latest.json 的一部分,
        # 但 latest.json 生成失败时连 .sig 一起丢了),所以这里自己用 tauri CLI signer 兜底:
        # 拿 tauri-action 重打包后的 .app.tar.gz 重签 -> 把 .sig 上传到 release -> 写 manifest 片段
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          ARCH_SHORT: ${{ matrix.arch_short }}
          UPDATER_KEY: ${{ matrix.updater_key }}
          REPO: ${{ github.repository }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          bundle_dir="apps/desktop/src-tauri/target/${TARGET}/release/bundle/macos"
          echo "----- ls $bundle_dir -----"
          ls -la "$bundle_dir" || true

          tarball="${bundle_dir}/mdview.app.tar.gz"
          if [ ! -f "$tarball" ]; then
            echo "ERROR: tarball missing at $tarball" >&2
            exit 1
          fi

          # 把 secret 写到文件,自动尝试 base64 解码
          # (很多教程让你 `base64 -i ~/.tauri/mdview.key | pbcopy` 后粘到 secret;
          #  也兼容直接粘原始两行格式)
          raw_file=$(mktemp)
          key_file=$(mktemp)
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$raw_file"

          # macOS BSD base64 不接受位置参数,必须 stdin 或 -i;用 stdin 兼容 Linux/macOS
          if base64 -d < "$raw_file" 2>/dev/null | head -1 | grep -q '^untrusted comment:'; then
            echo "secret is base64-encoded, decoding..."
            base64 -d < "$raw_file" > "$key_file"
          elif head -1 "$raw_file" | grep -q '^untrusted comment:'; then
            echo "secret looks like plain minisign key, using as-is"
            cp "$raw_file" "$key_file"
          else
            echo "ERROR: TAURI_SIGNING_PRIVATE_KEY secret 形状不对" >&2
            echo "  - 它既不是 base64-encoded 的 minisign key" >&2
            echo "  - 也不是 'untrusted comment: ...' 开头的原文" >&2
            echo "请在 GitHub Settings > Secrets 重设 TAURI_SIGNING_PRIVATE_KEY," >&2
            echo "推荐方式: 本地跑 \`base64 -i ~/.tauri/mdview.key | pbcopy\` 然后粘贴" >&2
            exit 1
          fi
          rm -f "$raw_file"

          # signer 的 --private-key-path 和 env TAURI_SIGNING_PRIVATE_KEY 互斥, unset 环境
          unset TAURI_SIGNING_PRIVATE_KEY
          pnpm --filter @mdview/desktop exec tauri signer sign \
            --private-key-path "$key_file" \
            --password "" \
            "$tarball"
          rm -f "$key_file"

          sig_src="${tarball}.sig"
          if [ ! -f "$sig_src" ]; then
            echo "ERROR: signer did not produce $sig_src" >&2
            ls -la "$bundle_dir"
            exit 1
          fi

          sig_dst="mdview_${ARCH_SHORT}.app.tar.gz.sig"
          cp "$sig_src" "$sig_dst"
          gh release upload "$TAG" "$sig_dst" --clobber

          mkdir -p out
          # 用 jq -Rs 把 signature 文件内容(带换行)安全编码为 JSON string
          sig_json=$(jq -Rs . < "$sig_src")
          url="https://github.com/${REPO}/releases/download/${TAG}/mdview_${ARCH_SHORT}.app.tar.gz"
          jq -n \
            --arg url "$url" \
            --argjson signature "$sig_json" \
            '{ signature: $signature, url: $url }' \
            > "out/${UPDATER_KEY}.json"
          echo "----- fragment -----"
          cat "out/${UPDATER_KEY}.json"

      - name: Upload manifest fragment artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest-fragment-${{ matrix.arch_short }}
          path: out/${{ matrix.updater_key }}.json
          if-no-files-found: error

  publish-manifest:
    name: Publish latest.json to main
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # 默认 GITHUB_TOKEN 有 contents:write,可以 push 到 main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all manifest fragments
        uses: actions/download-artifact@v4
        with:
          pattern: manifest-fragment-*
          merge-multiple: true
          path: fragments

      - name: Assemble latest.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#desktop-v}"
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p apps/mdview-sh/public/release
          # 累加 platforms: { "darwin-aarch64": {signature,url}, "darwin-x86_64": {signature,url} }
          platforms='{}'
          for f in fragments/*.json; do
            key=$(basename "$f" .json)
            platforms=$(jq --arg k "$key" --slurpfile body "$f" '. + { ($k): $body[0] }' <<<"$platforms")
          done
          jq -n \
            --arg version "$version" \
            --arg pub_date "$pub_date" \
            --argjson platforms "$platforms" \
            '{ version: $version, notes: "", pub_date: $pub_date, platforms: $platforms }' \
            > apps/mdview-sh/public/release/latest.json
          echo "----- generated latest.json -----"
          cat apps/mdview-sh/public/release/latest.json

      - name: Commit & push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mdview-sh/public/release/latest.json
          if git diff --cached --quiet; then
            echo "manifest unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "chore(release): publish desktop ${{ github.ref_name }} manifest"
          git push origin main
