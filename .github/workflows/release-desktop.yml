name: release-desktop

# 触发: 推送 desktop-v* tag
# 流程: 构建 universal mac 二进制 -> 用 minisign 私钥签名 -> 上传到同名 GH Release ->
#       把 latest.json commit 到 main 的 apps/mdview-sh/public/release/latest.json,
#       桌面端 plugin-updater 通过 raw.githubusercontent.com 立即拿到新版本。

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # 每个 arch 一个 matrix job, 各自 build + 各自签。tauri-action 把 .dmg/.app.tar.gz 上传到 release;
    # .sig 在它 v0.5 里有 bug 不会自动上传, 我们自己用 gh CLI 兜底, 再把 signature 内容作为 artifact
    # 传给 publish-manifest job 拼装 latest.json。
    name: Build & sign macOS (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch_short: aarch64       # tauri-action 给 .app.tar.gz 用的后缀
            updater_key: darwin-aarch64  # plugin-updater 在 latest.json 里查找的 key
          - target: x86_64-apple-darwin
            arch_short: x64
            updater_key: darwin-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # 不设 version,让 action 直接读 package.json#packageManager,避免双源冲突
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build workspace JS packages (consumed by desktop)
        run: pnpm -r --filter '@mdview/core' --filter '@mdview/themes' --filter '@mdview/format' run build

      - name: Build, sign & publish desktop release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ↓ 在 GitHub Secrets 里加这两个 (没 password 时第二个留空)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'mdview ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Re-sign tarball + upload .sig + emit manifest fragment
        # tauri-action 在重打包 .app.tar.gz 后没重新签 (它内部把 .sig 视作 latest.json 的一部分,
        # 但 latest.json 生成失败时连 .sig 一起丢了),所以这里自己用 tauri CLI signer 兜底:
        # 拿 tauri-action 重打包后的 .app.tar.gz 重签 -> 把 .sig 上传到 release -> 写 manifest 片段
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          ARCH_SHORT: ${{ matrix.arch_short }}
          UPDATER_KEY: ${{ matrix.updater_key }}
          REPO: ${{ github.repository }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          bundle_dir="apps/desktop/src-tauri/target/${TARGET}/release/bundle/macos"
          echo "----- ls $bundle_dir -----"
          ls -la "$bundle_dir" || true

          tarball="${bundle_dir}/mdview.app.tar.gz"
          if [ ! -f "$tarball" ]; then
            echo "ERROR: tarball missing at $tarball" >&2
            exit 1
          fi

          # tauri signer 已从 TAURI_SIGNING_PRIVATE_KEY env 拿到 key, 不能再传 --private-key-path
          # (二者互斥)。--password 也只能给一个;env 里 PASSWORD 是空字符串,等同无密码。
          # secret 形状自检 (只看长度+换行数+是否带 'untrusted' 头, 不泄露 key 主体):
          echo "::group::TAURI_SIGNING_PRIVATE_KEY shape check"
          key_len=${#TAURI_SIGNING_PRIVATE_KEY}
          # tr -cd 数 \n 个数(不依赖 wc -l 受最后一行影响)
          nl_count=$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | tr -cd '\n' | wc -c | tr -d ' ')
          starts_with_untrusted=no
          case "$TAURI_SIGNING_PRIVATE_KEY" in
            "untrusted comment:"*) starts_with_untrusted=yes ;;
          esac
          echo "key length:            $key_len"
          echo "key newline count:     $nl_count"
          echo "starts with header:    $starts_with_untrusted"
          if [ "$key_len" -lt 50 ] || [ "$starts_with_untrusted" = "no" ]; then
            echo "ERROR: TAURI_SIGNING_PRIVATE_KEY 形状不像 minisign secret key" >&2
            echo "应当是两行: 'untrusted comment: ...' + base64 主体" >&2
            exit 1
          fi
          echo "::endgroup::"

          pnpm --filter @mdview/desktop exec tauri signer sign "$tarball"

          sig_src="${tarball}.sig"
          if [ ! -f "$sig_src" ]; then
            echo "ERROR: signer did not produce $sig_src" >&2
            ls -la "$bundle_dir"
            exit 1
          fi

          sig_dst="mdview_${ARCH_SHORT}.app.tar.gz.sig"
          cp "$sig_src" "$sig_dst"
          gh release upload "$TAG" "$sig_dst" --clobber

          mkdir -p out
          # 用 jq -Rs 把 signature 文件内容(带换行)安全编码为 JSON string
          sig_json=$(jq -Rs . < "$sig_src")
          url="https://github.com/${REPO}/releases/download/${TAG}/mdview_${ARCH_SHORT}.app.tar.gz"
          jq -n \
            --arg url "$url" \
            --argjson signature "$sig_json" \
            '{ signature: $signature, url: $url }' \
            > "out/${UPDATER_KEY}.json"
          echo "----- fragment -----"
          cat "out/${UPDATER_KEY}.json"

      - name: Upload manifest fragment artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest-fragment-${{ matrix.arch_short }}
          path: out/${{ matrix.updater_key }}.json
          if-no-files-found: error

  publish-manifest:
    name: Publish latest.json to main
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # 默认 GITHUB_TOKEN 有 contents:write,可以 push 到 main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all manifest fragments
        uses: actions/download-artifact@v4
        with:
          pattern: manifest-fragment-*
          merge-multiple: true
          path: fragments

      - name: Assemble latest.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#desktop-v}"
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p apps/mdview-sh/public/release
          # 累加 platforms: { "darwin-aarch64": {signature,url}, "darwin-x86_64": {signature,url} }
          platforms='{}'
          for f in fragments/*.json; do
            key=$(basename "$f" .json)
            platforms=$(jq --arg k "$key" --slurpfile body "$f" '. + { ($k): $body[0] }' <<<"$platforms")
          done
          jq -n \
            --arg version "$version" \
            --arg pub_date "$pub_date" \
            --argjson platforms "$platforms" \
            '{ version: $version, notes: "", pub_date: $pub_date, platforms: $platforms }' \
            > apps/mdview-sh/public/release/latest.json
          echo "----- generated latest.json -----"
          cat apps/mdview-sh/public/release/latest.json

      - name: Commit & push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mdview-sh/public/release/latest.json
          if git diff --cached --quiet; then
            echo "manifest unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "chore(release): publish desktop ${{ github.ref_name }} manifest"
          git push origin main
