<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>mdview</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 240px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        background: #ffffff;
        color: #1f2328;
      }
      h1 { margin: 0 0 12px; font-size: 14px; font-weight: 700; }
      label { display: block; font-size: 11.5px; color: rgba(31,35,40,0.55); margin-bottom: 4px; }
      select { width: 100%; padding: 6px 8px; border: 1px solid rgba(0,0,0,0.15); border-radius: 5px; font-family: inherit; font-size: 12.5px; }
      a { color: #0969da; font-size: 12px; text-decoration: none; }
      a:hover { text-decoration: underline; }
      footer { margin-top: 14px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.08); }
    </style>
  </head>
  <body>
    <h1>mdview</h1>
    <label for="theme">Theme</label>
    <select id="theme">
      <option value="default">Default</option>
      <option value="github">GitHub</option>
      <option value="medium">Medium</option>
    </select>
    <footer>
      <a href="https://mdview.sh" target="_blank" rel="noopener">Learn more →</a>
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
